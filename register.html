<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Lý & Đăng Ký Nhân Viên</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md border border-slate-200">
        <div class="text-center mb-6">
            <div class="w-16 h-16 bg-blue-600 rounded-full flex items-center justify-center mx-auto mb-3 shadow-md shadow-blue-200">
                <i class="fa-solid fa-user-gear text-2xl text-white"></i>
            </div>
            <h1 class="text-2xl font-bold text-slate-800">THÊM NHÂN VIÊN MỚI</h1>
            <p class="text-slate-400 text-xs mt-1">Nhập thông tin chi tiết và tiến hành quét sinh trắc học</p>
        </div>
        
        <div class="space-y-3 mb-5">
            <div>
                <label class="block text-slate-600 text-xs font-bold mb-1">Mã Nhân Viên <span class="text-red-500">*</span></label>
                <input type="text" id="emp-id" placeholder="Ví dụ: NV01" class="w-full px-4 py-2.5 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition uppercase font-semibold text-slate-700">
            </div>
            <div>
                <label class="block text-slate-600 text-xs font-bold mb-1">Họ và Tên <span class="text-red-500">*</span></label>
                <input type="text" id="emp-name" placeholder="Ví dụ: Nguyễn Văn Hoàng" class="w-full px-4 py-2.5 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition text-slate-700">
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-slate-600 text-xs font-bold mb-1">Phòng ban / Vị trí</label>
                    <input type="text" id="emp-dept" placeholder="Ví dụ: Bếp, Sales" class="w-full px-4 py-2.5 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition text-slate-700">
                </div>
                <div>
                    <label class="block text-slate-600 text-xs font-bold mb-1">Ca làm việc mặc định</label>
                    <input type="text" id="emp-shift" placeholder="Ví dụ: Ca Sáng, Hành chính" class="w-full px-4 py-2.5 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition text-slate-700">
                </div>
            </div>
        </div>

        <div class="relative w-full aspect-video bg-slate-900 rounded-2xl overflow-hidden mb-6 border-4 border-slate-100 shadow-inner">
            <video id="video" autoplay muted class="w-full h-full object-cover scale-x-[-1]"></video>
            <div id="status-overlay" class="absolute inset-0 flex flex-col items-center justify-center text-white bg-slate-950 bg-opacity-70 font-medium text-sm gap-2">
                <i class="fa-solid fa-spinner animate-spin text-xl text-blue-500"></i>
                <span>Đang đồng bộ AI từ Cloud...</span>
            </div>
        </div>

        <button onclick="enrollFace()" id="btn-enroll" class="bg-blue-600 hover:bg-blue-700 disabled:bg-slate-300 text-white font-bold py-3.5 px-6 rounded-xl w-full shadow-lg shadow-blue-100 transition transform active:scale-[0.98] flex items-center justify-center gap-2" disabled>
            <i class="fa-solid fa-id-card"></i> LƯU THÔNG TIN & KHUÔN MẶT
        </button>
    </div>

    <script>
        // --- 1. CẤU HÌNH ĐƯỜNG DẪN KẾT NỐI ---
        // Hãy dán chính xác đường link Web App của bạn vào đây (Giữ nguyên hai dấu nháy đơn):
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbybtYlXRLY1laX61W6BceagDTnVSuiOLG9tcaWdfSPtGMfNmmMSI6NNsdzIbDT4eEwg/exec';

        const video = document.getElementById('video');
        const statusOverlay = document.getElementById('status-overlay');
        const btnEnroll = document.getElementById('btn-enroll');

        // --- 2. TẢI MÔ HÌNH NHẬN DIỆN TỪ KHO LƯU TRỮ CLOUD ---
        const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';
        
        Promise.all([
            faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
            faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
            faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
        ]).then(startVideo).catch(err => {
            statusOverlay.innerHTML = `<i class="fa-solid fa-triangle-exclamation text-red-500 text-xl"></i> <span class="text-red-400 mt-1">Lỗi kết nối mạng tải dữ liệu AI!</span>`;
            console.error(err);
        });

        function startVideo() {
            // Xin cấp quyền định vị GPS ngầm trước để tăng trải nghiệm sau này
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(() => {}, () => {}); 
            }
            
            navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480, facingMode: "user" } })
                .then(stream => {
                    video.srcObject = stream;
                    statusOverlay.innerHTML = `<i class="fa-solid fa-circle-check text-green-500 text-xl"></i> <span class="text-green-400 mt-1">Hệ thống đã sẵn sàng!</span>`;
                    setTimeout(() => statusOverlay.style.display = 'none', 1200);
                    btnEnroll.disabled = false;
                })
                .catch(err => {
                    statusOverlay.innerHTML = `<i class="fa-solid fa-video-slash text-red-500 text-xl"></i> <span class="text-red-400 mt-1">Không thể kết nối Camera!</span>`;
                    Swal.fire({ icon: 'error', title: 'Quyền Truy Cập', text: 'Vui lòng cho phép trình duyệt sử dụng Camera của bạn!' });
                });
        }

        // --- 3. QUÉT TRÍCH XUẤT SINH TRẮC HỌC VÀ GỬI LÊN SHEETS ---
        async function enrollFace() {
            const empId = document.getElementById('emp-id').value.trim();
            const empName = document.getElementById('emp-name').value.trim();
            const empDept = document.getElementById('emp-dept').value.trim();
            const empShift = document.getElementById('emp-shift').value.trim();

            if (!empId || !empName) {
                Swal.fire({ icon: 'warning', title: 'Trống dữ liệu', text: 'Mã Nhân Viên và Họ Tên là bắt buộc!' });
                return;
            }

            // Đóng băng nút bấm để tránh việc người dùng nhấn liên tục
            btnEnroll.disabled = true;
            Swal.fire({ title: 'AI đang phân tích...', html: 'Vui lòng giữ khuôn mặt thẳng trước camera', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });

            // Quét tìm khuôn mặt tối ưu nhất trong luồng video
            const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 224, scoreThreshold: 0.5 }))
                                        .withFaceLandmarks()
                                        .withFaceDescriptor();

            if (!detection) {
                Swal.fire({ icon: 'error', title: 'Không quét được mặt', text: 'Vui lòng đứng ở nơi đủ sáng, nhìn thẳng camera và không đeo khẩu trang!' });
                btnEnroll.disabled = false;
                return;
            }

            // Đóng gói gói tin Payload gửi lên CSDL
            const payload = {
                action: 'enroll',
                maNV: empId,
                hoTen: empName,
                phongBan: empDept,
                caLam: empShift,
                descriptor: Array.from(detection.descriptor) // Chuyển đổi ma trận số sang mảng JSON thường
            };

            Swal.update({ title: 'Đang đẩy dữ liệu lên Sheets...' });

            fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(payload),
                headers: { 'Content-Type': 'text/plain;charset=utf-8' } 
            })
            .then(response => response.json())
            .then(data => {
                if(data.status === 'success') {
                    Swal.fire({ icon: 'success', title: 'Thành công!', text: data.message, timer: 3000 });
                    // Reset sạch form để chuẩn bị nhập người kế tiếp
                    document.getElementById('emp-id').value = '';
                    document.getElementById('emp-name').value = '';
                    document.getElementById('emp-dept').value = '';
                    document.getElementById('emp-shift').value = '';
                } else {
                    Swal.fire({ icon: 'error', title: 'Lỗi đồng bộ', text: data.message });
                }
            })
            .catch(error => {
                Swal.fire({ icon: 'error', title: 'Lỗi đường truyền', text: 'Không thể thiết lập liên kết đến Google Sheets.' });
            })
            .finally(() => {
                btnEnroll.disabled = false; // Mở khóa lại nút bấm
            });
        }
    </script>
</body>
</html>
