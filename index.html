<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chấm Công Thông Minh AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-blue-50 to-slate-200 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-6 md:p-8 rounded-3xl shadow-2xl w-full max-w-md border border-white relative">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-black text-blue-800 tracking-tight">FACE ID CHECK-IN</h1>
            <p id="clock" class="text-slate-500 font-mono text-lg mt-1 font-semibold">00:00:00</p>
        </div>
        
        <button onclick="requestAdminAccess()" class="absolute top-6 right-6 text-slate-300 hover:text-blue-600 transition duration-300 z-50" title="Khu vực Quản Trị">
            <i class="fa-solid fa-lock text-xl"></i>
        </button>

        <div class="relative w-full aspect-[4/3] bg-slate-900 rounded-2xl overflow-hidden mb-6 border-4 border-slate-100 shadow-inner">
            <video id="video" autoplay muted playsinline class="w-full h-full object-cover scale-x-[-1]"></video>
            
            <div id="status-overlay" class="absolute inset-0 flex flex-col items-center justify-center text-white bg-slate-950 bg-opacity-80 font-medium z-20">
                <i class="fa-solid fa-cloud-arrow-down animate-bounce text-3xl text-blue-400 mb-3"></i>
                <span id="loading-text">Đang tải dữ liệu nhân sự...</span>
            </div>

            <div id="user-info-box" class="absolute bottom-4 left-1/2 transform -translate-x-1/2 bg-green-500 text-white px-5 py-2 rounded-full font-bold text-sm shadow-lg border-2 border-white flex items-center gap-2 opacity-0 transition-opacity duration-300 z-10">
                <i class="fa-solid fa-face-smile-wink"></i>
                <span id="detected-name">Đang quét...</span>
            </div>
        </div>

        <p class="text-center text-xs text-slate-400 mb-6 font-medium">
            <i class="fa-solid fa-location-dot"></i> Bắt Wifi cửa hàng hoặc bật định vị để chấm công
        </p>
        
        <div class="grid grid-cols-2 gap-4">
            <button onclick="submitCheckIn('In')" id="btn-in" class="bg-green-500 hover:bg-green-600 disabled:bg-slate-300 disabled:text-slate-500 text-white font-bold py-4 px-2 rounded-xl shadow-md transition transform active:scale-95 flex flex-col items-center justify-center gap-1" disabled>
                <i class="fa-solid fa-right-to-bracket text-xl"></i> 
                <span>VÀO CA</span>
            </button>
            <button onclick="submitCheckIn('Out')" id="btn-out" class="bg-orange-500 hover:bg-orange-600 disabled:bg-slate-300 disabled:text-slate-500 text-white font-bold py-4 px-2 rounded-xl shadow-md transition transform active:scale-95 flex flex-col items-center justify-center gap-1" disabled>
                <i class="fa-solid fa-right-from-bracket text-xl"></i> 
                <span>TAN CA</span>
            </button>
        </div>
    </div>

    <script>
        function getDistanceFromLatLonInKm(lat1, lon1, lat2, lon2) {
          var R = 6371; 
          var dLat = deg2rad(lat2 - lat1);
          var dLon = deg2rad(lon2 - lon1); 
          var a = 
            Math.sin(dLat/2) * Math.sin(dLat/2) +
            Math.cos(deg2rad(lat1)) * Math.cos(deg2rad(lat2)) * Math.sin(dLon/2) * Math.sin(dLon/2); 
          var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); 
          var d = R * c; 
          return Math.round(d * 1000); 
        }

        function deg2rad(deg) { return deg * (Math.PI/180); }

        // --- 1. CẤU HÌNH HỆ THỐNG ---
        // NHỚ CẬP NHẬT LẠI URL NẾU BẠN VỪA DEPLOY BẢN MỚI
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxM-q4QYABmdj4Bk_uggl7SyKRX9HiJoRNJiidRsy-IVmMd1MCsohAyIkJSu4BfWmo/exec';
        
        // Tọa độ test của bạn 
        const COMPANY_LAT = 21.036825147908875; 
        const COMPANY_LNG = 105.80325927558656; 
        const ALLOWED_RADIUS = 150; // Nới lỏng 150 mét chống trôi dạt GPS

        let faceMatcher = null;
        let currentEmpId = null;
        let currentEmpName = null;
        let STORE_IP = null; // Biến lưu IP mạng Wi-Fi cửa hàng
        
        const video = document.getElementById('video');
        const overlay = document.getElementById('status-overlay');
        const loadingText = document.getElementById('loading-text');
        const userInfoBox = document.getElementById('user-info-box');
        const detectedName = document.getElementById('detected-name');
        const btnIn = document.getElementById('btn-in');
        const btnOut = document.getElementById('btn-out');

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('vi-VN');
        }, 1000);

        async function initSystem() {
            try {
                loadingText.innerText = "Đang lấy dữ liệu từ Sheets...";
                
                // --- NẠP IP CỦA CỬA HÀNG TỪ SHEETS ---
                try {
                    const resIP = await fetch(APPS_SCRIPT_URL + '?action=get_store_ip');
                    const dataIP = await resIP.json();
                    STORE_IP = dataIP.ip;
                } catch(e) { console.log("Không tải được IP cửa hàng"); }

                const response = await fetch(APPS_SCRIPT_URL + '?action=get_employees');
                const employees = await response.json();

                if(employees.length === 0) {
                    loadingText.innerText = "Chưa có nhân viên nào được đăng ký!";
                    return;
                }

                const validEmployees = employees.filter(emp => emp.descriptor && emp.descriptor !== null);

                if(validEmployees.length === 0) {
                    loadingText.innerText = "Chưa có mẫu khuôn mặt nào!";
                    return;
                }

                loadingText.innerText = "Đang khởi động AI...";
                const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
                ]);

                const labeledDescriptors = validEmployees.map(emp => {
                    const floatArray = new Float32Array(Object.values(emp.descriptor));
                    return new faceapi.LabeledFaceDescriptors(`${emp.maNV}|${emp.hoTen}`, [floatArray]);
                });
                
                faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.45);
                startCamera();

            } catch (error) {
                loadingText.innerHTML = `<span class="text-red-400">Lỗi kết nối máy chủ!</span>`;
                console.error(error);
            }
        }

        function startCamera() {
    // Xin quyền vị trí
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(() => {}, () => {}); 
    }
    
    // BẬT CAMERA VỚI ĐỘ PHÂN GIẢI THẤP ĐỂ CHỐNG TREO MÁY
    navigator.mediaDevices.getUserMedia({ 
        video: { 
            facingMode: "user",
            width: { ideal: 640 },  // Bắt buộc giới hạn chiều rộng
            height: { ideal: 480 }  // Bắt buộc giới hạn chiều cao
        } 
    })
    .then(stream => {
        video.srcObject = stream;
        overlay.style.display = 'none';
        
        // Gọi hàm quét khuôn mặt an toàn
        video.addEventListener('play', scanFaceContinously);
    })
    .catch(err => {
        loadingText.innerHTML = `<span class="text-red-400">Không có quyền Camera!</span>`;
        console.error("Lỗi Camera:", err);
    });
}

// ========================================================
// HÀM QUÉT KHUÔN MẶT CÓ BỘ ĐỆM (CHỐNG TRÀN RAM, TREO WEB)
// ========================================================
async function scanFaceContinously() {
    // Nếu video bị dừng, thoát vòng lặp ngay để giải phóng bộ nhớ
    if (video.paused || video.ended) return;

    try {
        // Quét khuôn mặt với cấu hình siêu nhẹ (TinyFaceDetector)
        const detection = await faceapi.detectSingleFace(
            video, 
            new faceapi.TinyFaceDetectorOptions({ inputSize: 224, scoreThreshold: 0.5 })
        ).withFaceLandmarks().withFaceDescriptor();

        if (detection && isAiReady) {
            // Điểm mấu chốt để tìm nhân viên (Giả sử bạn đã có biến faceMatcher)
            if (typeof faceMatcher !== 'undefined' && faceMatcher !== null) {
                const bestMatch = faceMatcher.findBestMatch(detection.descriptor);
                
                // NẾU NHẬN DIỆN THÀNH CÔNG VÀ CHƯA ĐANG TRONG QUÁ TRÌNH CHẤM CÔNG (isProcessing)
                if (bestMatch.label !== 'unknown' && !isProcessing) {
                    // Cắm cờ để hệ thống tạm dừng quét, tránh gửi API liên tục
                    isProcessing = true; 
                    
                    const matchedEmployee = employees.find(e => e.maNV === bestMatch.label);
                    if (matchedEmployee) {
                        // Gọi hàm chấm công của bạn ở đây
                        chamCong(matchedEmployee);
                    }
                }
            }
        }
    } catch (error) {
        console.error("Lỗi quét khuôn mặt:", error);
    }

    // NGHỈ 500MS TRƯỚC KHI QUÉT TIẾP (Bí quyết để Vercel không bị treo cứng)
    setTimeout(scanFaceContinously, 500); 
}

        async function scanFaceContinously() {
            setInterval(async () => {
                if(!faceMatcher) return;

                const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();

                if (detection) {
                    const bestMatch = faceMatcher.findBestMatch(detection.descriptor);
                    
                    if (bestMatch.label !== 'unknown') {
                        const [id, name] = bestMatch.label.split('|');
                        currentEmpId = id;
                        currentEmpName = name;
                        
                        detectedName.innerText = `Chào ${name}`;
                        userInfoBox.classList.remove('opacity-0', 'bg-red-500');
                        userInfoBox.classList.add('opacity-100', 'bg-green-500');
                        btnIn.disabled = false;
                        btnOut.disabled = false;
                    } else {
                        resetDetection();
                        detectedName.innerText = `Khuôn mặt lạ`;
                        userInfoBox.classList.remove('opacity-0', 'bg-green-500');
                        userInfoBox.classList.add('opacity-100', 'bg-red-500');
                    }
                } else {
                    resetDetection();
                    userInfoBox.classList.remove('opacity-100');
                    userInfoBox.classList.add('opacity-0');
                }
            }, 1000); 
        }

        function resetDetection() {
            currentEmpId = null;
            currentEmpName = null;
            btnIn.disabled = true;
            btnOut.disabled = true;
        }

        // --- 6. XỬ LÝ GỬI DỮ LIỆU CHẤM CÔNG ---
        async function submitCheckIn(type) {
            if (!currentEmpId) return;

            Swal.fire({ title: 'Đang kiểm tra kết nối mạng...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            // KIỂM TRA MẠNG WI-FI (Ưu tiên số 1)
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                const currentIP = data.ip;

                if (STORE_IP && currentIP === STORE_IP) {
                    sendToServer(type, "Mạng Wi-Fi Quán");
                    return; 
                }
            } catch (e) {
                console.log("Lỗi lấy IP, chuyển sang quét GPS...");
            }

            // KIỂM TRA GPS NẾU KHÔNG DÙNG WIFI
            Swal.update({ title: 'Đang xác thực tọa độ GPS...' });
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const accuracy = position.coords.accuracy;
                        if (accuracy > 150) {
                            Swal.fire({ 
                                icon: 'warning', 
                                title: 'Tín hiệu GPS quá yếu!', 
                                text: `Sai số hiện tại là ${Math.round(accuracy)}m. Vui lòng kết nối vào Wi-Fi của quán để được chấm công ngay lập tức!` 
                            });
                            return; 
                        }

                        const distance = getDistanceFromLatLonInKm(position.coords.latitude, position.coords.longitude, COMPANY_LAT, COMPANY_LNG);
                        if (distance > ALLOWED_RADIUS) {
                            Swal.fire({ 
                                icon: 'error', 
                                title: 'Ngoài phạm vi', 
                                html: `Bạn cách quán <b>${Math.round(distance)}m</b>.<br>Vui lòng kết nối <b>Wi-Fi quán</b> hoặc di chuyển vào khu vực ${ALLOWED_RADIUS}m.` 
                            });
                        } else {
                            sendToServer(type, `${position.coords.latitude}, ${position.coords.longitude}`);
                        }
                    },
                    () => Swal.fire({ icon: 'error', title: 'Lỗi GPS', text: 'Hãy bật định vị hoặc kết nối vào mạng Wi-Fi của quán!' }),
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 } 
                );
            } else {
                Swal.fire({ icon: 'error', title: 'Thiết bị không hỗ trợ', text: 'Vui lòng dùng thiết bị có hỗ trợ định vị.' });
            }
        }

        function requestAdminAccess() {
            Swal.fire({
                title: 'Xác Thực Quản Lý',
                html: 'Vui lòng nhập mật khẩu để truy cập bảng điều khiển.',
                input: 'password',
                inputPlaceholder: 'Nhập mật khẩu...',
                inputAttributes: { autocapitalize: 'off', autocorrect: 'off' },
                showCancelButton: true,
                confirmButtonText: 'Đăng Nhập',
                cancelButtonText: 'Hủy',
                confirmButtonColor: '#2563eb',
            }).then((result) => {
                if (result.isConfirmed) {
                    const password = result.value;
                    if (password === 'admin123') {
                        Swal.fire({
                            title: 'Đăng nhập thành công!',
                            html: 'Đang chuyển hướng...',
                            timer: 1500,
                            timerProgressBar: true,
                            didOpen: () => { Swal.showLoading(); }
                        }).then(() => {
                            window.location.href = 'admin.html';
                        });
                    } else {
                        Swal.fire({ icon: 'error', title: 'Từ chối truy cập', text: 'Mật khẩu quản trị không chính xác!' });
                    }
                }
            });
        }

        function sendToServer(type, coords) {
            Swal.update({ title: 'Đang ghi nhận giờ...' });

            const payload = {
                action: 'cham_cong',
                maNV: currentEmpId,
                hoTen: currentEmpName,
                loai: type,
                toaDo: coords
                // Đã bỏ tham số caLam gửi từ Client. Backend sẽ tự động lấy trong lịch phân ca.
            };

            fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(payload),
                // LƯU Ý QUAN TRỌNG: Phải dùng text/plain để vượt qua bảo mật Preflight CORS của Google Script
                headers: { 'Content-Type': 'text/plain;charset=utf-8' } 
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === 'success') {
                    Swal.fire({ icon: 'success', title: 'Hoàn tất!', text: data.message, timer: 4000 });
                } else {
                    Swal.fire({ icon: 'warning', title: 'Lưu ý', text: data.message });
                }
            })
            .catch((err) => {
                console.error(err);
                Swal.fire({ icon: 'error', title: 'Lỗi mạng', text: 'Không thể kết nối đến máy chủ Google.' });
            });
        }

        initSystem();
    </script>
</body>
</html>
